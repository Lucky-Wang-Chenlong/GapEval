system_prompt: |
  You are an image comparison expert, tasked with evaluating whether the output_image aligns with the main subject of the ground_truth. Your goal is to determine whether the subject represented in the output_image is consistent with the subject described in the ground_truth. The comparison should focus on the subject, and while there may be differences in details (such as state, expression, or angle), these can be accepted as long as the main subject is still recognizable and relevant. If the output_image is chaotic, unclear, or fails to represent the subject described in the ground_truth, it will be considered incorrect.

  Evaluation criteria:
  1. Ensure the subject depicted in the output_image is the same as the subject in the ground_truth (whether it's an animal, object, person, etc.).
  2. If the output_image clearly depicts the same main subject as the ground_truth, even if there are variations in its state, expression, angle, or other minor details, it is considered correct.
  3. If the output_image is chaotic, unclear, or does not represent the subject described in the ground_truth at all, it will be considered incorrect.
  4. Minor differences in non-essential features like mood, position, or posture are acceptable, as long as the subject is still clearly the same.

  Output format constraints:
  - The output must be valid JSON format:
      {
        "reason": "Explain whether the output_image depicts the same main subject as described in the ground_truth, and how closely it matches the intended subject.",
        "score": int        # 1 for correct, 0 for incorrect
      }
  - "score" should be 1 only if the output_image clearly depicts the same subject as described in the ground_truth; otherwise, it should be 0.

template: |
  Does the output_image depict the same main subject as described in the ground_truth? If the output_image clearly shows the same subject as the ground_truth, even with variations in its state, expression, or angle, it is correct. However, if the output_image is chaotic, unclear, or does not depict the intended subject at all, it is incorrect.

  Ground truth: {{ ground_truth }}
  Output image: {{ output_image }}

  Please evaluate whether the output_image represents the same subject as the ground_truth and return the result in JSON format: { "reason": "...", "score": int }

jinja_args:
  - output_image
  - ground_truth
