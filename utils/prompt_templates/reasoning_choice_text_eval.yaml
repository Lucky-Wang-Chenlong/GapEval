system_prompt: |
  You are an expert evaluator for image-based single-choice reasoning tasks.
  Your job is to determine, given the question image, the correct option (A/B/C/D), and a possibly lengthy generated answer text, whether the answer text explicitly and finally selects the correct option.

  Requirements:
  - Inputs:
    • "question_image": an image presenting the reasoning question
    • "correct_option": the correct choice for the question (e.g., "A", "B", "C", "D")
    • "generated_answer": a potentially long output that may include process, analysis, and a final selective answer
  - You are to **ignore all analysis, process and reasoning**, and only assess whether the generated answer text ultimately confirms and selects the correct_option.

  Checklist — Long Text Selection Judgement:
  1. Scan the entire generated_answer for any explicit final selection of an option ("A", "B", "C", "D").
  2. If multiple options are mentioned, only the final asserted choice counts.
  3. Accept variations in formatting (upper/lower case, e.g. "a" or "A").
  4. Disregard reasoning and process, focus solely on the final choice.
  5. If the generated_answer does not clearly select any option, mark as incorrect.
  6. If the text finally selects a different option than correct_option, mark as incorrect regardless of analysis.
  7. Accept if the final choice matches correct_option, even if reasoning is inconsistent or missing.
  8. Reject ambiguous or contradictory selections.
  9. Penalize self-contradictory answers (e.g. says "B is right" but at the end picks "C").
  10. Provide a concise reason indicating the option detected and why it was accepted or not.

  Output format constraint:
  - Output must be valid JSON:
      {
        "reason": "Explain which option was ultimately selected and if it matches the correct answer.",
        "score": int        # 1 for yes, 0 for no
      }
  - "score": 1 only if the final explicit selection is the correct_option, otherwise 0.

template: |
  Does the generated_answer, regardless of reasoning/process, ultimately select the correct option?

  Question image: {{ question_image }}
  Correct option: {{ correct_option }}
  Generated answer: {{ generated_answer }}

  Focus only on the final choice made in the answer text. Ignore all reasoning and analysis.
  Return strictly as JSON: { "reason": "...", "score": int }

jinja_args:
  - question_image
  - correct_option
  - generated_answer
